<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Egtronics COMS</title>
<!-- Pretendard 폰트 CDN -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body, #root { height: 100%; }
  /* Boot splash (shown until React mounts) */
  .boot {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #F1F5F9;
    color: #64748B;
    font-family: 'Pretendard Variable', system-ui, sans-serif;
  }
  .boot__logo {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, #2563EB 0%, #60A5FA 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 20px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.28);
  }
  .boot__txt { font-size: 13px; letter-spacing: 0.01em; }
  .boot__spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2.5px solid #CBD5E1; border-top-color: #2563EB;
    animation: bootspin 0.7s linear infinite;
  }
  .boot.hide {
    display: none !important;
  }
  @keyframes bootspin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <div class="boot__logo">P</div>
    <div class="boot__spin"></div>
    <div class="boot__txt">SQLite 데이터베이스 초기화 중…</div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/@babel/plugin-transform-react-jsx-production@7.29.0/lib/index.min.js"></script>

<script>
// Babel 플러그인 설정 (프로덕션 경고 억제)
if (window.Babel) {
  window.Babel.registerPlugin('transform-react-jsx-production', window.BabelPluginTransformReactJsxProduction.default);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script>
// 부트 스플래시 상태 메시지 업데이트 함수
window.updateBootStatus = function(msg) {
  const txt = document.querySelector('.boot__txt');
  if (txt) txt.textContent = msg;
};

// SQL.js 초기화 플래그
window.__sqlReady = false;
window.__sqlError = false;

// SQL.js 로드 완료 확인
if (typeof initSqlJs === 'function') {
  window.__sqlReady = true;
} else {
  // 동적 로드 대기
  setTimeout(() => {
    if (typeof initSqlJs === 'function') {
      window.__sqlReady = true;
    } else {
      console.error('sql.js failed to load');
      window.__sqlError = true;
      window.updateBootStatus('sql.js 로드 실패. 새로고침하세요.');
    }
  }, 3000);
}
</script>

<!-- 일반 JS 파일 (JSX 아님) -->
<script src="data.js"></script>
<script src="db.js"></script>

<!-- Babel 변환이 필요한 JSX 파일 -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="sales-input.jsx"></script>
<script type="text/babel" src="production-waiting.jsx"></script>
<script type="text/babel" src="production-mapping.jsx"></script>
<script type="text/babel" src="production-complete.jsx"></script>
<script type="text/babel" src="order-lookup.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>

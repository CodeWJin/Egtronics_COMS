<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Egtronics COMS</title>
<!-- Resource hints — early connection to CDN origins -->
<link rel="preconnect" href="https://unpkg.com"/>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="dns-prefetch" href="https://t1.daumcdn.net"/>
<!-- Pretendard 폰트 CDN (npm CDN — 상대 경로 404 방지) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css"/>
<!-- JetBrains Mono — 모노스페이스 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body, #root { height: 100%; }
  /* Boot splash (shown until React mounts) */
  .boot {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #f5f5f7;
    color: #7a7a7a;
    font-family: 'Pretendard Variable', system-ui, -apple-system, sans-serif;
  }
  .boot__logo {
    height: 46px;
    width: auto;
    object-fit: contain;
  }
  .boot__txt { font-size: 14px; letter-spacing: -0.224px; color: #7a7a7a; }
  .boot__spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #e0e0e0; border-top-color: #0066cc;
    animation: bootspin 0.7s linear infinite;
  }
  .boot.hide {
    display: none !important;
  }
  @keyframes bootspin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <img class="boot__logo" src="logo_header_black.png" alt="Egtronics" />
    <div class="boot__spin"></div>
    <div class="boot__txt">Supabase 연결 중…</div>
  </div>
</div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
window.updateBootStatus = function(msg) {
  const txt = document.querySelector('.boot__txt');
  if (txt) txt.textContent = msg;
};
</script>

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>

<!-- Chart.js — 대시보드 막대그래프 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.js" crossorigin="anonymous"></script>

<!-- Supabase 접속 정보 (이 파일에 URL과 키 입력) -->
<script src="supabase-config.js"></script>

<!-- DB 레이어 -->
<script src="db.js"></script>

<!-- 카카오 우편번호 서비스 -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<!-- Babel 변환이 필요한 JSX 파일 -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="sales-input.jsx"></script>
<script type="text/babel" src="production-waiting.jsx"></script>
<script type="text/babel" src="ship-inspection.jsx"></script>
<script type="text/babel" src="production-mapping.jsx"></script>
<script type="text/babel" src="quality-AwaitPickup.jsx"></script>
<script type="text/babel" src="order-lookup.jsx"></script>
<script type="text/babel" src="admin-users.jsx"></script>
<script type="text/babel" src="as-components.jsx"></script>
<script type="text/babel" src="as-receipt.jsx"></script>
<script type="text/babel" src="as-processing.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EgtronicsCharger Management Web</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body, #root { height: 100%; }
  /* Boot splash (shown until React mounts) */
  .boot {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #F1F5F9;
    color: #64748B;
    font-family: 'Pretendard Variable', system-ui, sans-serif;
  }
  .boot__logo {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, #2563EB 0%, #60A5FA 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 20px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.28);
  }
  .boot__txt { font-size: 13px; letter-spacing: 0.01em; }
  .boot__spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2.5px solid #CBD5E1; border-top-color: #2563EB;
    animation: bootspin 0.7s linear infinite;
  }
  @keyframes bootspin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="root">
  <div class="boot">
    <div class="boot__logo">P</div>
    <div class="boot__spin"></div>
    <div class="boot__txt">SQLite 데이터베이스 초기화 중…</div>
  </div>
</div>
